name: Validate Platform

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Application Artifacts
        run: |
          VITE_AOIFMSP_API_MODE=mock npm run build -w @aoifmsp/web
          npm run build -w @aoifmsp/functions
          npm run package:functions

      - name: Build Bicep Templates
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infra/azure/platform/main.bicep
            az bicep build --file infra/azure/platform/resource-group.bicep
            az bicep build --file policy/azure/main.bicep
